edges:
  known_hierarchies:
    - {specific: CRISPR-CAS9,  general: CRISPR,                          target_type: Concept, confidence: 0.96}
    - {specific: CRISPRa,      general: CRISPR,                          target_type: Method,  confidence: 0.97}
    - {specific: FACS,         general: Flow cytometry,                  target_type: Method,  confidence: 0.96}
    - {specific: MeRIP-seq,    general: RNA-Seq,                         target_type: Method,  confidence: 0.94}
    - {specific: qRT-PCR,      general: qPCR,                            target_type: Method,  confidence: 0.95}
    - {specific: qPCR,         general: PCR,                             target_type: Concept, confidence: 0.93}
    - {specific: RT-PCR,       general: PCR,                             target_type: Concept, confidence: 0.92}
    - {specific: DESeq2,       general: differential expression analysis, target_type: Method,  confidence: 0.91}
    - {specific: bowtie2,      general: read alignment method,           target_type: Method,  confidence: 0.89}
    - {specific: MACS2,        general: peak calling method,             target_type: Method,  confidence: 0.89}
