extraction:

  # ── Biomedical method terms ─────────────────────────────────────────────────
  # Used to build _BIOMEDICAL_METHOD_RE at first use. Add new assay names here;
  # no Python edits needed. Terms are joined into a single alternation regex,
  # escaped, and wrapped in \b word-boundary anchors.
  biomedical_methods:
    - chip-seq
    - rna-seq
    - dna-seq
    - crispra
    - crispr/cas9
    - crispr
    - merip
    - flow-cytometry
    - mass-spec
    - lc-ms
    - gc-ms
    - hplc
    - immunoblot
    - western-blot
    - immunofluorescence
    - facs
    - co-ip
    - yeast-two-hybrid
    - elisa
    - qpcr
    - qrt-pcr
    - rt-pcr
    - rnai
    - sirna
    - morpholino
    - knockout
    - knockdown
    - conditional-knockout
    - transgenic
    - reporter-assay
    - luciferase-assay
    - chromatin-ip
    - cut-and-run
    - atac-seq
    - dnase-seq
    - capture-c
    - hi-c
    - 3c
    - 4c
    - 5c
    - single-cell-seq
    - 10x-genomics
    - single-cell-rna
    - bisulfite-seq
    - methylation-array
    - gwas
    - exome-seq
    - whole-genome
    - microarray
    - proteomics
    - metabolomics
    - lipidomics
    - glycomics
    - deseq2
    - deseq
    - trimmomatic
    - bowtie2
    - bowtie
    - bwa
    - samtools
    - bedtools
    - picard
    - gatk
    - biopython
    - matrigel
    - cell-invasion
    - trans-well

  # ── Fragment exclusions ─────────────────────────────────────────────────────
  # _is_valid_method() rejects any candidate whose .lower().strip() is in this
  # list. Add generic phrases that the method regexes accidentally match.
  method_fragment_exclusions:
    - 4c
    - analysis
    - approach
    - assay
    - bulk measurement
    - ensuring precise detection and quantification
    - for this assay
    - in our analysis
    - in this procedure
    - materials and methods
    - mammalian species and some model
    - method
    - our analysis
    - per the manufacturer and sequencing
    - procedure
    - system
    - the analysis
    - the assay
    - technique
    - this assay
    - uniform method
    - well-rounded approach

  # Single generic words that are never valid standalone technique names.
  generic_method_names:
    - analysis
    - approach
    - assay
    - framework
    - method
    - model
    - pipeline
    - process
    - procedure
    - protocol
    - system
    - technique

  # Generic suffixes used to detect method phrases without hardcoding paper-
  # specific technique names in Python.
  generic_method_suffixes:
    - assay
    - seq
    - sequencing
    - cytometry
    - blot
    - imaging
    - microscopy
    - spectroscopy
    - chromatography

  # Generic quantity families used to infer result metrics from local context.
  quantity_patterns:
    percentage:
      - "%"
      - percent
      - percentage
    fold_change:
      - fold
      - fold-change
      - fold change
    p_value:
      - p value
      - p-value
      - p <
      - p >
    concentration:
      - concentration
      - molar
      - micromolar
      - nanomolar
      - picomolar

  # ── Metric labels ───────────────────────────────────────────────────────────
  # Scanned in _find_metric_match(). At load time the list is sorted longest
  # first so longer labels shadow shorter substrings (e.g. "fold-change" before
  # "fold"). Add new metrics here; no Python edits needed.
  metric_labels:
    # voting / social
    - yes-vote share
    - yes-vote
    - yes-rate
    - adoption rate
    - adoption
    - approval rate
    - global consensus
    - consensus
    - agreement
    - support
    - polarization
    - attitude
    - opinion
    # ML performance
    - performance
    - accuracy
    - precision
    - recall
    - f1 score
    - f1
    - bleu
    - auc
    - loss
    - error
    - perplexity
    - rmse
    - mae
    - mape
    - r2
    # Biomedical statistics
    - p-value
    - p value
    - fold-change
    - fold change
    - log2-fold-change
    - log2 fold change
    - ec50
    - ic50
    - ki
    - kd
    - km
    - vmax
    - significance
    - statistical significance
    # Molecular / cellular
    - expression level
    - gene expression
    - mrna level
    - protein level
    - phosphorylation
    - methylation
    - acetylation
    - ubiquitination
    - sumoylation
    - palmitoylation
    - proliferation rate
    - proliferation
    - cell viability
    - cell survival
    - apoptosis
    - cell death
    - differentiation
    - migration
    - invasion
    - migration rate
    - invasion rate
    - wound closure
    - binding affinity
    - dissociation constant
    - association rate
    # Imaging / spectroscopy
    - fluorescence intensity
    - intensity
    - signal intensity
    - rfu
    - relative fluorescence
    - luminescence
    - absorbance
    - optical density
    - od
    # PTM percentages
    - percent phosphorylated
    - percent methylated
    - percent acetylated
    - half-life
    - half life
    - t1/2
    - area under curve
    # Concentration / sequencing
    - concentration
    - micromolar
    - nanomolar
    - picomolar
    - copy number
    - read count
    - transcript
    - exon
    - splice junction
    # Cell-cycle / m6A
    - g2/m phase
    - g2 m phase
    - cell cycle phase
    - m6a percentage
    - methylation percentage

  # Abbreviation → expanded name. Applied in _expand_metric_name() before
  # storing a result entity so that "od" becomes "Optical Density" etc.
  metric_expansions:
    od: Optical Density
    ki: Dissociation Constant (Ki)
    kd: Dissociation Constant (Kd)
    km: Michaelis Constant (Km)
    vmax: Maximum Velocity (Vmax)
    ec50: Half-maximal Effective Concentration (EC50)
    ic50: Half-maximal Inhibitory Concentration (IC50)
    rfu: Relative Fluorescence Units
    auc: Area Under Curve
    rmse: Root Mean Square Error
    mae: Mean Absolute Error
    mape: Mean Absolute Percentage Error
    r2: Coefficient of Determination (R²)
    p-value: P-value
    f1: F1 Score
    bleu: BLEU Score

  # ── Method type classification ──────────────────────────────────────────────
  # _method_type() iterates these groups in order; first matching token wins.
  # "computational_fallback" is checked last if nothing else matched.
  method_type_keywords:
    statistical:
      - deseq
      - statistical
      - significance
      - regression
      - test
    computational:
      - bowtie
      - samtools
      - bedtools
      - software
      - algorithm
      - alignment
      - peak calling
    experimental:
      - assay
      - blot
      - cytometry
      - crispr
      - culture
      - electroporation
      - elisa
      - experiment
      - flow
      - microscopy
      - pcr
      - sequencing
      - transfection
    computational_fallback:
      - simulation
      - model
      - architecture
      - pipeline
      - framework
      - system

  # ── Canonical maps ─────────────────────────────────────────────────────────
  method_canonical_map:
    a-seq and the macs2 algorithm: MACS2
    cell cycle analysis: Cell cycle analysis
    chip-seq: ChIP-Seq
    crispr: CRISPR
    crispr-cas9: CRISPR
    crispr/cas9: CRISPR
    crispra: CRISPRa
    deseq: DESeq2
    deseq2: DESeq2
    elisa: ELISA
    facs: FACS
    facs analysis: FACS
    flow cytometry: Flow cytometry
    immunoblot: Western blot
    matrigel: Matrigel chamber assay
    matrigel chamber assay: Matrigel chamber assay
    me-rip-seq: MeRIP-seq
    merip: MeRIP-seq
    merip-seq: MeRIP-seq
    meripseq and data analysis: MeRIP-seq
    meripseq: MeRIP-seq
    meRIP: MeRIP-seq
    model-based analysis: MACS2
    macs2: MACS2
    m6a sequencing: m6A sequencing
    qpcr: qPCR
    qrt-pcr: qRT-PCR
    rt-pcr: RT-PCR
    rna-seq: RNA-Seq
    rnaseq: RNA-Seq
    sequencing and bioinformatics analysis: Bioinformatics analysis
    western blot: Western blot
    western blot analysis: Western blot analysis

  method_type_overrides:
    bowtie2: computational
    Cell cycle analysis: experimental
    ChIP-Seq: experimental
    CRISPR: experimental
    CRISPRa: experimental
    DESeq2: statistical
    ELISA: experimental
    FACS: experimental
    Flow cytometry: experimental
    MACS2: computational
    MeRIP-seq: experimental
    Matrigel chamber assay: experimental
    qPCR: experimental
    qRT-PCR and western blot analysis: experimental
    qRT-PCR: experimental
    RNA-Seq: experimental
    Western blot: experimental
    Western blot analysis: experimental

  # ── Alias maps ─────────────────────────────────────────────────────────────
  # Checked when corpus lookup returns nothing. Keys are lowercased canonical
  # names; values are known text variants to scan for in chunk text.
  method_aliases:
    crispr:
      - crispr-cas9
      - crispr/cas9
      - clustered regularly interspaced short palindromic repeats
    deseq2:
      - deseq
      - differential expression analysis
    matrigel invasion assay:
      - invasion assay
      - trans-well invasion
      - cell invasion
    chip-seq:
      - chromatin immunoprecipitation sequencing
      - chip sequencing
    rna-seq:
      - rnaseq
      - rna sequencing
      - whole transcriptome sequencing
    western blot:
      - western blotting
      - immunoblot
    elisa:
      - enzyme-linked immunosorbent assay
    qpcr:
      - quantitative pcr
      - real-time pcr
      - qRT-PCR
      - RT-PCR
    facs:
      - fluorescence activated cell sorting
      - flow cytometry
    flow cytometry:
      - facs
      - fluorescence activated cell sorting
    immunofluorescence:
      - immunofluorescence microscopy
      - if
    northern blot:
      - northern blotting
    merip-seq:
      - me-rip-seq
      - m6A-seq
      - m6A sequencing

  # Text-pattern aliases for concepts. Keys are lowercased concept names;
  # values are variant spellings scanned against chunk text as a fallback.
  concept_text_aliases:
    m6a:
      - n6-methyladenosine
      - n6 methyladenosine
      - m⁶a
      - n6-methyl-adenosine
    methylation:
      - m6a modification
      - dna methylation
      - histone methylation
    phosphorylation:
      - protein phosphorylation
      - kinase activity
    acetylation:
      - histone acetylation
      - lysine acetylation
    ubiquitination:
      - protein ubiquitination
      - ubiquitin modification
    crispr:
      - crispr-cas9
      - crispr/cas9
      - crispr technology
    gene expression:
      - mrna levels
      - transcript levels
      - protein expression
    cell cycle:
      - cell division
      - cell proliferation
    apoptosis:
      - programmed cell death
      - cell death

  # ── Generic dataset / experimental group hints ────────────────────────────
  # The extractor uses these phrases to recognize experimental groups without
  # relying on paper-specific labels. Parenthetical abbreviations and numbered
  # scenarios are handled generically in code.
  dataset_keywords:
    - control group
    - treated group
    - untreated
    - wild type
    - wildtype
    - knockout
    - knockdown
    - vehicle
    - placebo
    - baseline
    - experimental group
    - treatment group
    - case group
    - patient cohort
    - sample cohort
    - group 1
    - group 2
    - scenario 1
    - scenario 2

  # Generic scientific concept endings used outside biomedical-only corpora.
  concept_patterns:
    - pathway
    - receptor
    - inhibitor
    - activator
    - complex
    - cascade

  concept_canonical_map:
    adam19: ADAM19
    alkbh5: ALKBH5
    e2f4: E2F4
    fto: FTO
    hif1a: HIF-1α
    hif1α: HIF-1α
    hif-1α: HIF-1α
    hnrnpa2b1: HNRNPA2B1
    macs2: MACS2
    mettl3: METTL3
    mettl14: METTL14
    rbm15: RBM15
    wtap: WTAP
    ythdc1: YTHDC1
    ythdf1: YTHDF1
    ythdf3: YTHDF3

  concept_alias_map:
    ADAM19: [A disintegrin and metalloproteinase 19]
    ALKBH5: [alkB homolog 5]
    HIF-1α: [HIF1A, hypoxia-inducible factor 1-alpha]
    HNRNPA2B1: [heterogeneous nuclear ribonucleoprotein A2/B1]
    METTL3: [methyltransferase like 3, N6-adenosine-methyltransferase catalytic subunit]
    METTL14: [methyltransferase like 14]
    RBM15: [RNA-binding motif protein 15]
    WTAP: [Wilms' Tumor 1-Associating Protein, Wilms tumor 1-associating protein]
    YTHDC1: [YTH domain containing 1]
    YTHDF1: [YTH N6-methyladenosine RNA binding protein 1]
    YTHDF3: [YTH N6-methyladenosine RNA binding protein 3]

